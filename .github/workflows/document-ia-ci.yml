name: document-ia API CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Ruff lint and Pytest
    runs-on: ubuntu-latest
    env:
      # Default envs for app config during tests
      API_KEY: test-api-key
      HOST: 127.0.0.1
      PORT: 8001
      PYTHONPATH: document-ia-api/src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi --with dev

      - name: Ruff - Lint sources
        run: poetry run ruff check document-ia-api/src

      - name: Pytest - Unit tests
        if: ${{ hashFiles('document-ia-api/tests/**/*.py') != '' }}
        run: poetry run pytest --maxfail=1 --disable-warnings