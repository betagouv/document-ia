name: document-ia API CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Ruff lint and Pytest
    runs-on: ubuntu-latest
    env:
      # Python path for imports
      PYTHONPATH: document-ia-api/src
      # Configuration de l'API
      API_KEY: your-secret-api-key-here

      # Configuration PostgreSQL
      POSTGRES_DB: document_ia_test
      POSTGRES_HOST: localhost
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your-secure-postgres-password
      POSTGRES_PORT: 5432

      # Configuration Redis
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: your-secure-redis-password

      # Configuration MinIO (S3 compatible, only for dev)
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_PORT: 9000
      MINIO_CONSOLE_PORT: 9001

      # Configuration S3/MinIO Storage
      S3_ENDPOINT_URL: http://localhost:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_NAME: document-ia-test
      S3_REGION_NAME: us-east-1
      S3_USE_SSL: false

      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}

      # Tesseract configuration for tests
      TESSERACT_LANG: fra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      # Install Tesseract OCR and French trained data
      - name: Install Tesseract OCR (with French language)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tesseract-ocr tesseract-ocr-fra
          tesseract --version
          tesseract --list-langs | grep -i '\bfra\b' || (echo "French language not found" && exit 1)

      - name: Install dependencies (all sub-projects)
        run: |
          echo "== Reading .project-file =="
          if [ ! -f .project-file ]; then echo ".project-file manquant"; exit 1; fi
          grep -v '^[# ]' .project-file | while read project; do
            [ -z "$project" ] && continue
            echo "---- Installing $project ----"
            if [ -f "$project/pyproject.toml" ]; then
              (cd "$project" && poetry install --no-interaction --no-ansi --with dev)
            else
              echo "Skip: $project (pas de pyproject.toml)"
            fi
          done

      - name: Ruff - Lint sources
        run: |
          echo "== Reading .project-file =="
          if [ ! -f .project-file ]; then echo ".project-file manquant"; exit 1; fi
          grep -v '^[# ]' .project-file | while read project; do
            [ -z "$project" ] && continue
            echo "---- Linting sources ----"
            if [ -f "$project/pyproject.toml" ]; then
              (cd "$project" && poetry run ruff check src)
            else
              echo "Skip: $project (pas de pyproject.toml)"
            fi
          done

      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name postgres-test \
            -e POSTGRES_DB=${POSTGRES_DB} \
            -e POSTGRES_USER=${POSTGRES_USER} \
            -e POSTGRES_PASSWORD=${POSTGRES_PASSWORD} \
            -p ${POSTGRES_PORT}:5432 \
            postgres:17-alpine

      - name: Start Redis
        run: |
          docker run -d \
            --name redis-test \
            -p ${REDIS_PORT}:6379 \
            redis:8-alpine

      - name: Start MinIO
        run: |
          docker run -d \
            --name minio-test \
            -e MINIO_ROOT_USER=${MINIO_ROOT_USER} \
            -e MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD} \
            -p ${MINIO_API_PORT}:9000 \
            -p ${MINIO_CONSOLE_PORT}:9001 \
            minio/minio:latest-cicd server /data --console-address ":9001"

      - name: Wait for PostgreSQL to be ready
        run: |
          timeout 60s bash -c 'until docker exec postgres-test pg_isready -U postgres; do sleep 1; done'
          echo "PostgreSQL is ready!"

      - name: Wait for Redis to be ready
        run: |
          timeout 60s bash -c 'until docker exec redis-test redis-cli ping | grep -q PONG; do sleep 1; done'
          echo "Redis is ready!"

      - name: Wait for MinIO to be ready
        run: |
          timeout 60s bash -c 'until curl -f http://localhost:9000/minio/health/live; do sleep 1; done'
          echo "MinIO is ready!"

      - name: Run migrations
        run: (cd document-ia-api && poetry run alembic upgrade head)

      - name: Init S3 bucket
        run: (cd document-ia-api && poetry run python ../scripts/init-s3-bucket.py)

      - name: Pytest - Tests
        run: |
          echo "== Reading .project-file =="
          if [ ! -f .project-file ]; then echo ".project-file manquant"; exit 1; fi
          grep -v '^[# ]' .project-file | while read project; do
            [ -z "$project" ] && continue
            echo "---- Running Tests ----"
            if [ -f "$project/pyproject.toml" ]; then
              (cd "$project" && poetry run pytest --maxfail=1 --disable-warnings)
            else
              echo "Skip: $project (pas de pyproject.toml)"
            fi
          done

      - name: Cleanup Docker containers
        if: always()
        run: |
          docker stop postgres-test redis-test minio-test || true
          docker rm postgres-test redis-test minio-test || true
